<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Tweak state (persisted) ───────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "playful",
  "theme": "dark"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  const V = { tweaks, update };

  return (
    <>
      {tweaks.direction === 'editorial' && <Editorial {...V} />}
      {tweaks.direction === 'playful' && <Playful {...V} />}
      {tweaks.direction === 'technical' && <Technical {...V} />}
      {editMode && <TweakPanel tweaks={tweaks} update={update} />}
    </>
  );
}

);

// Tiny sparkline generator for fake-but-believable stats
const spark = (n=24, seed=1) => {
  let s = seed;
  const rand = () => { s = (s*9301+49297) % 233280; return s/233280; };
  return Array.from({length:n}, (_,i) => 30 + Math.sin(i/2+seed)*12 + rand()*18);
};

function DemoCard() {
  const [stage, setStage] = useState(0); // 0 paste, 1 parsing, 2 quiz
  const [selected, setSelected] = useState(null);
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const loop = setTimeout(() => {
      if (stage === 0) setStage(1);
      else if (stage === 1) setStage(2);
      else { setStage(0); setSelected(null); setProgress(0); }
    }, stage === 1 ? 2600 : 4800);
    return () => clearTimeout(loop);
  }, [stage]);

  useEffect(() => {
    if (stage !== 1) return;
    let p = 0;
    const iv = setInterval(() => { p = Math.min(100, p+7); setProgress(p); }, 170);
    return () => clearInterval(iv);
  }, [stage]);

  return (
    <div style={{
      background:'#15161A',border:'1px solid #2D2E35',borderRadius:20,overflow:'hidden',
      boxShadow:'0 40px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(16,185,129,0.08)'
    }}>
      {/* chrome */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 16px',borderBottom:'1px solid #2D2E35',background:'#101115'}}>
        <span style={dot('#FF5F57')}/><span style={dot('#FEBC2E')}/><span style={dot('#28C840')}/>
        <div style={{marginLeft:12,fontSize:12,color:'#64748B',fontFamily:'JetBrains Mono, monospace'}}>quizmint.app/generate</div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,fontSize:11,color:'#10B981'}}>
          <span style={{width:6,height:6,borderRadius:99,background:'#10B981'}}/> Live
        </div>
      </div>

      {stage === 0 && (
        <div style={{padding:24}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:1.4,color:'#10B981',marginBottom:10}}>RAW DATA INPUT</div>
          <div style={{background:'#0A0A0C',border:'1px solid #2D2E35',borderRadius:12,padding:16,fontFamily:'JetBrains Mono, monospace',fontSize:12.5,lineHeight:1.7,color:'#CBD5E1',minHeight:220}}>
            <div>1. Which structure regulates blood sugar?</div>
            <div style={{paddingLeft:14}}>A) Liver</div>
            <div style={{paddingLeft:14}}>B) Pancreas</div>
            <div style={{paddingLeft:14}}>C) Kidney</div>
            <div style={{paddingLeft:14}}>D) Spleen</div>
            <div style={{marginTop:8}}>2. The mitochondrion's inner membrane is folded into...</div>
            <div style={{paddingLeft:14}}>A) Cristae</div>
            <div style={{paddingLeft:14}}>B) Thylakoids</div>
            <div style={{paddingLeft:14}}>C) Stroma</div>
            <div style={{paddingLeft:14}}>D) Matrix</div>
            <div style={{marginTop:10,color:'#64748B'}}>Answer Key:</div>
            <div style={{color:'#64748B'}}>1. B &nbsp; 2. A<span style={{background:'#10B981',width:7,height:14,display:'inline-block',marginLeft:3,verticalAlign:'middle',animation:'blink 1s steps(2) infinite'}}/></div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16}}>
            <div style={{fontSize:12,color:'#64748B'}}>2 questions detected · Biology</div>
            <button style={btnPrimary}>✨ Generate module</button>
          </div>
        </div>
      )}

      {stage === 1 && (
        <div style={{padding:24,minHeight:320,display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:1.4,color:'#10B981',marginBottom:14}}>AI ENGINE WORKING</div>
          {[
            ['Parsing document structure', progress>10],
            ['Identifying 24 questions', progress>35],
            ['Grading difficulty (Medium)', progress>60],
            ['Writing explanations', progress>85],
          ].map(([t,done],i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',color: done?'#fff':'#64748B',fontSize:14,transition:'color .3s'}}>
              <span style={{width:18,height:18,borderRadius:99,border:'1.5px solid '+(done?'#10B981':'#2D2E35'),display:'flex',alignItems:'center',justifyContent:'center',background:done?'#10B981':'transparent'}}>
                {done && <span style={{color:'#0A0A0C',fontSize:11,fontWeight:800}}>✓</span>}
              </span>
              <span>{t}</span>
            </div>
          ))}
          <div style={{marginTop:18,height:4,background:'#0A0A0C',borderRadius:99,overflow:'hidden',border:'1px solid #2D2E35'}}>
            <div style={{height:'100%',width:progress+'%',background:'#10B981',transition:'width .25s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11,fontFamily:'JetBrains Mono, monospace',color:'#64748B'}}>
            <span>Analyzing dataset</span><span>{progress}%</span>
          </div>
        </div>
      )}

      {stage === 2 && (
        <div style={{padding:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:1.4,color:'#10B981'}}>QUESTION 1 OF 24</div>
            <div style={{fontSize:11,color:'#64748B',fontFamily:'JetBrains Mono, monospace'}}>MEDIUM · 00:47</div>
          </div>
          <div style={{fontSize:18,fontWeight:600,lineHeight:1.35,marginBottom:16,color:'#fff'}}>
            Which organ is primarily responsible for regulating blood sugar levels?
          </div>
          {['Liver','Pancreas','Kidney','Spleen'].map((opt,i) => {
            const isCorrect = i===1;
            const picked = selected === i;
            const bg = picked ? (isCorrect ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.12)') : '#0A0A0C';
            const br = picked ? (isCorrect ? '#10B981' : '#EF4444') : '#2D2E35';
            return (
              <button key={i} onClick={()=>setSelected(i)} style={{
                width:'100%',textAlign:'left',padding:'12px 14px',margin:'6px 0',
                background:bg,border:'1px solid '+br,borderRadius:10,color:'#fff',fontSize:14,
                display:'flex',alignItems:'center',gap:12,cursor:'pointer',transition:'all .15s'
              }}>
                <span style={{width:22,height:22,borderRadius:6,border:'1px solid '+br,display:'grid',placeItems:'center',fontSize:11,fontFamily:'JetBrains Mono, monospace',color:'#94A3B8'}}>{String.fromCharCode(65+i)}</span>
                {opt}
                {picked && isCorrect && <span style={{marginLeft:'auto',color:'#10B981',fontSize:12,fontWeight:600}}>✓ Correct</span>}
              </button>
            );
          })}
          {selected===1 && (
            <div style={{marginTop:12,padding:'12px 14px',background:'rgba(16,185,129,0.08)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:10,fontSize:13,color:'#A7F3D0',lineHeight:1.55}}>
              <b style={{color:'#10B981'}}>Why:</b> The pancreas secretes insulin and glucagon, the two hormones that raise and lower glucose in the bloodstream.
            </div>
          )}
        </div>
      )}
      <style>{`@keyframes blink { 50% { opacity: 0 } }`}</style>
    </div>
  );
}

function EdHow() {
  const steps = [
    {n:'01',t:'Drop in a document',d:'PDF of a textbook chapter, DOCX of a problem set, or a bare paste from the web — anything with questions and a key.'},
    {n:'02',t:'AI parses + structures',d:'QuizMint identifies each question stem, options, and the correct answer. It flags ambiguous items for review.'},

  ];
  return (
    <section style={{background:'#09090B',borderTop:'1px solid #1A1B20',borderBottom:'1px solid #1A1B20'}}>
      <div style={{maxWidth:1240,margin:'0 auto',padding:'96px 32px'}}>
        <div style={{fontSize:12,color:'#10B981',letterSpacing:2,fontWeight:600,marginBottom:16}}>HOW IT WORKS</div>
        <h2 style={{fontSize:44,letterSpacing:-1.4,fontWeight:700,margin:'0 0 48px',maxWidth:700}}>
          Three steps. Roughly eight seconds.
        </h2>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:1,background:'#1A1B20',border:'1px solid #1A1B20',borderRadius:18,overflow:'hidden'}}>

const JsonSyntax = ({text}) => {
  // crude but readable JSON coloring
  const lines = text.split('\n');
  return <>{lines.map((ln,i) => {
    const parts = [];
    let rest = ln;
    const re = /("[^"]*":)|("[^"]*")|(\/\/.*)|(\.\.\.)/g;
    let last = 0, m;
    while ((m = re.exec(ln)) !== null) {
      if (m.index > last) parts.push(<span key={last} style={{color:'#94A3B8'}}>{ln.slice(last,m.index)}</span>);
      if (m[1]) parts.push(<span key={m.index} style={{color:'#67E8F9'}}>{m[1]}</span>);
      else if (m[2]) parts.push(<span key={m.index} style={{color:'#86EFAC'}}>{m[2]}</span>);
      else if (m[3]) parts.push(<span key={m.index} style={{color:'#64748B'}}>{m[3]}</span>);
      else if (m[4]) parts.push(<span key={m.index} style={{color:'#475569'}}>{m[4]}</span>);
      last = m.index + m[0].length;
    }
    if (last < ln.length) parts.push(<span key={last+'z'} style={{color:'#94A3B8'}}>{ln.slice(last)}</span>);
    return <div key={i}>{parts.length?parts:ln}{' '}</div>;
  })}</>;
};
